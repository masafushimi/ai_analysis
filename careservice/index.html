<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ケアサービスにおける生成AI活用研修</title>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a237e; /* ディープネイビー */
            --accent-color: #c5a572;  /* マットゴールド */
            --text-color: #333333;
            --light-text: #757575;
            --bg-color: #e8eaf6;
            --slide-bg: #ffffff;
            /* Step Colors (より落ち着いたトーン) */
            --step1-bg: #f5f7fa; 
            --step1-border: #c5cae9;
            --step2-bg: #fafafa;
            --step2-border: #e0e0e0;
            --step3-bg: #f1f8e9;
            --step3-border: #c8e6c9;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        h1.page-title {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .controls {
            margin-bottom: 40px;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: inline-block;
        }

        button.download-btn {
            background: linear-gradient(135deg, var(--primary-color), #283593);
            color: white;
            border: none;
            padding: 16px 36px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 4px 10px rgba(26, 35, 126, 0.3);
        }

        button.download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(26, 35, 126, 0.4);
        }

        /* スライドプレビューのスタイル */
        .slide-preview-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .slide {
            width: 960px; /* 16:9比率 */
            height: 540px;
            background: var(--slide-bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 50px;
            box-sizing: border-box;
            text-align: left;
            overflow: hidden;
            border-radius: 4px;
        }

        /* スライドの装飾線 */
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color) 70%, var(--accent-color) 100%);
        }

        .slide-number {
            position: absolute;
            bottom: 15px;
            right: 25px;
            color: var(--light-text);
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
        }

        .slide-title {
            font-size: 32px;
            color: var(--primary-color);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 15px;
        }
        
        .slide-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background-color: var(--accent-color);
        }

        .slide-sub-title {
            font-size: 20px;
            color: var(--light-text);
            font-weight: 500;
            margin-top: -20px;
            margin-bottom: 30px;
        }

        /* 3ステップレイアウト */
        .process-flow {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            height: 300px;
            margin-top: 20px;
            gap: 20px;
        }

        .step-box {
            flex: 1;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            font-size: 15px;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        
        .step-box:hover {
            transform: translateY(-3px);
        }

        .step-box h3 {
            margin-top: 5px;
            font-size: 18px;
            color: var(--primary-color);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .step-1 { background-color: var(--step1-bg); border-top: 4px solid #5c6bc0; }
        .step-2 { background-color: var(--step2-bg); border-top: 4px solid #bdbdbd; }
        .step-3 { background-color: var(--step3-bg); border-top: 4px solid #66bb6a; }

        .arrow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
        }
        
        .arrow {
            font-size: 24px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .step-content {
            flex-grow: 1;
            line-height: 1.6;
        }
        
        .step-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--light-text);
            margin-bottom: 5px;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.05em;
        }

        /* タイトルスライド用 */
        .title-slide-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
            height: 100%;
            padding-left: 20px;
        }
        
        .slide.title-type::before {
             background: none; /* タイトルスライドは上部の線を消す */
        }

        .main-title { 
            font-size: 48px; 
            color: var(--primary-color); 
            margin-bottom: 25px; 
            font-weight: 800; 
            font-family: 'Montserrat', sans-serif;
            line-height: 1.2;
        }
        .sub-title { 
            font-size: 24px; 
            color: var(--text-color); 
            line-height: 1.5;
            border-left: 4px solid var(--accent-color);
            padding-left: 20px;
        }

        /* 通常リスト用 */
        .bullet-list {
            padding-left: 30px;
        }
        .bullet-list li { 
            margin-bottom: 15px; 
            font-size: 20px; 
            line-height: 1.6;
            color: var(--text-color);
        }
        .bullet-list li::marker {
            color: var(--accent-color);
        }

    </style>
</head>
<body>

<div class="container">
    <h1 class="page-title">ケアサービスにおける生成AI活用研修</h1>
    <div class="controls">
        <p style="margin-bottom: 20px; color: var(--light-text);">以下のボタンを押すと、このプロフェッショナルデザインでPowerPointファイル(.pptx)がダウンロードされます。</p>
        <button class="download-btn" onclick="generatePPTX()">
            📥 PowerPoint (.pptx) をダウンロード
        </button>
    </div>

    <div class="slide-preview-container" id="previewArea">
    </div>
</div>

<script>
    // --- スライドデータ定義 ---
    const slidesData = [
        {
            type: "title",
            title: "ケアサービスにおける生成AI活用研修：\nケアの質を変える「3つのステップ」",
            sub: "記録業務の負担を減らし、利用者との「対話」を最大化する実践アプローチ\n\n[発表者名/組織名]"
        },
        {
            type: "concept",
            title: "AIは「事務員」であり、「ベテランの相談相手」",
            content: [
                "今の課題：記録に追われ、過去の情報を活かしきれていない。",
                "【AI活用の新サイクル】",
                "Step-1 Input (人間)：見たこと、聞いたことを入れる",
                "Step-2 Process (AI)：要約・分析・アイデア出し",
                "Step-3 Output (人間)：整理された情報で温かいケア",
                "結論：事務作業はAIに、心の通うケアは人間に。"
            ]
        },
        {
            type: "case",
            title: "【事例1】接遇・コミュニケーション",
            subTitle: "話題に困らない。「その人だけの」会話サジェスト",
            step1: { label: "Input (記録)", text: "日々の何気ない会話や属性をメモ。\n\n・「元エンジニア」\n・「将棋が好き（最近やってない）」\n・「孫が3歳」" },
            step2: { label: "Process (AI思考)", text: "指示：「この方の興味に関連し、かつ今の季節を感じる話題を3つ作って」\n\nAI案：\n「エンジニア時代の一番の思い出は？」\n「お孫さんの七五三の予定は？」" },
            step3: { label: "Output (現場活用)", text: "新人スタッフでも、スマホを見るだけで、まるで長年の付き合いのような深い会話が可能に。\n\n効果：利用者の「覚えていてくれた」という喜び。" }
        },
        {
            type: "case",
            title: "【事例2】記録・事務業務",
            subTitle: "残業ゼロへ。喋るだけの「記録完了」スタイル",
            step1: { label: "Input (音声入力)", text: "介助直後、スマホに向かって箇条書きで発話。\n\n「〇〇さん、昼食全量摂取。ちょっとむせ込みあり。お茶にとろみ追加」" },
            step2: { label: "Process (AI整文)", text: "指示：「介護記録のフォーマット（食事・状態・特記）に整理し、正しい日本語にして」\n\nAI案：\n【食事】全量摂取\n【状態】嚥下時に軽度むせ込み\n【対応】とろみ追加" },
            step3: { label: "Output (出力)", text: "生成されたテキストをシステムにコピペして終了。\n\n効果：記録時間が半分以下に。その場の空気感も残せる。" }
        },
        {
            type: "case",
            title: "【事例3】レクリエーション企画",
            subTitle: "準備10分。「参加したくなる」企画の無限生成",
            step1: { label: "Input (条件)", text: "現状の条件を入力。\n\n・「参加者：車椅子の高齢者5名」\n・「時間：20分」\n・「季節：秋」\n・「道具：新聞紙のみ」" },
            step2: { label: "Process (AIアイデア)", text: "指示：「この条件で、座ったまま盛り上がるゲームを3案考えて。進行台本付きで」\n\nAI案：\n「秋の味覚狩りゲーム（丸めた新聞紙を芋に見立てる）」＋「盛り上げ台本」" },
            step3: { label: "Output (実施)", text: "経験の浅いスタッフでも、台本通りに進めるだけでプロ並みの進行。\n\n効果：マンネリ化からの脱却。" }
        },
        {
            type: "case",
            title: "【事例4】ケアプラン・自立支援",
            subTitle: "新人ケアマネが「ベテランの視点」を持つ",
            step1: { label: "Input (アセスメント)", text: "利用者情報を入力。\n\n・「80代女性、独居」\n・「転倒不安あり」\n・「買い物に行きたいが膝が痛い」" },
            step2: { label: "Process (AI推論)", text: "指示：「自立支援の観点から、優先課題とショートゴールを提案して」\n\nAI案：\n課題「活動範囲縮小」\n目標「シルバーカーでコンビニへ行く」\n推奨「訪問リハ」" },
            step3: { label: "Output (提案)", text: "AI案をたたき台に、家族へ根拠ある提案を行う。\n\n効果：プラン作成の時短と、ケアの質の標準化。" }
        },
        {
            type: "case",
            title: "【事例5】勤務シフト作成の自動化",
            subTitle: "複雑な条件も一瞬。公平性と効率を両立した「下書き」生成",
            step1: { label: "Input (制約条件)", text: "条件とスタッフ希望を入力。\n\n・スタッフ20名の希望休\n・必要資格者の配置ルール\n・労働基準法/夜勤回数制限\n・新人/ベテランのペアリング" },
            step2: { label: "Process (AIパズル)", text: "指示：「これらの条件をすべて満たし、不公平感のない1ヶ月分のシフト表案を作成して」\n\nAI案：\nルール違反をゼロにし、連休や夜勤間隔を自動調整したたたき台を提示。" },
            step3: { label: "Output (管理者の判断)", text: "管理者は微調整するだけで完成。作成時間が数日→数十分に。\n\n効果：管理者の精神的負担の激減。ミスのない人員配置。" }
        },
        {
            type: "case",
            title: "【事例6】マニュアル・基準検索",
            subTitle: "分厚いファイルは不要。質問すれば「答え」が返ってくる",
            step1: { label: "Input (資料読込)", text: "Google NotebookLM等にPDFを読込。\n\n・運営基準解釈通知\n・事業所マニュアル\n・会議議事録" },
            step2: { label: "Process (検索)", text: "質問：「オンラインモニタリングの必須要件は何だっけ？」\n\nAI回答：\n「運営基準によると1.心身安定、2.医師の合意...が必要です」とソース付きで回答。" },
            step3: { label: "Output (確認)", text: "調べ物時間が数十分→数秒に短縮。\n\n効果：確実な根拠に基づいた業務遂行。ハルシネーション防止。" }
        },
        {
            type: "concept",
            title: "まとめ：AIを「パートナー」にして、本来のケアへ",
            content: [
                "Input (観察) と Output (ケア) は「人間」の役割。",
                "Process (事務・考案) は「AI」に任せる。",
                "",
                "【Next Action】",
                "まずは無料のツール(ChatGPT等)で「日誌の要約」や「レクの案出し」から始めてみましょう。"
            ]
        }
    ];

    // --- HTMLプレビュー生成処理 ---
    function renderPreview() {
        const container = document.getElementById('previewArea');
        
        slidesData.forEach((slide, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';
            if (slide.type === 'title') slideDiv.classList.add('title-type');
            
            // Slide Number
            slideDiv.innerHTML += `<div class="slide-number">${index + 1}</div>`;

            if (slide.type === 'title') {
                slideDiv.innerHTML += `
                    <div class="title-slide-content">
                        <div class="main-title">${slide.title.replace(/\n/g, '<br>')}</div>
                        <div class="sub-title">${slide.sub.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            } else if (slide.type === 'concept') {
                slideDiv.innerHTML += `<div class="slide-title">${slide.title}</div>`;
                let ul = `<ul class="bullet-list">`;
                slide.content.forEach(item => {
                    ul += `<li>${item}</li>`;
                });
                ul += `</ul>`;
                slideDiv.innerHTML += ul;
            } else if (slide.type === 'case') {
                slideDiv.innerHTML += `<div class="slide-title">${slide.title}</div>`;
                slideDiv.innerHTML += `<div class="slide-sub-title">${slide.subTitle}</div>`;
                slideDiv.innerHTML += `
                    <div class="process-flow">
                        <div class="step-box step-1">
                            <div class="step-label">Step-1</div>
                            <h3>${slide.step1.label}</h3>
                            <div class="step-content">${slide.step1.text.replace(/\n/g, '<br>')}</div>
                        </div>
                        <div class="arrow-container"><div class="arrow">▶</div></div>
                        <div class="step-box step-2">
                            <div class="step-label">Step-2</div>
                            <h3>${slide.step2.label}</h3>
                            <div class="step-content">${slide.step2.text.replace(/\n/g, '<br>')}</div>
                        </div>
                        <div class="arrow-container"><div class="arrow">▶</div></div>
                        <div class="step-box step-3">
                            <div class="step-label">Step-3</div>
                            <h3>${slide.step3.label}</h3>
                            <div class="step-content">${slide.step3.text.replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>
                `;
            }
            container.appendChild(slideDiv);
        });
    }

    // --- PowerPoint生成処理 (PptxGenJS) - Pro Design ---
    function generatePPTX() {
        let pres = new PptxGenJS();
        
        pres.layout = 'LAYOUT_16x9';

        // --- プロフェッショナルカラー定義 ---
        const colorPrimary = '1A237E'; 
        const colorAccent = 'C5A572';  
        const colorText = '333333';
        const colorLightText = '757575';
        
        const colorStep1Bg = 'F5F7FA'; const colorStep1Border = '5C6BC0';
        const colorStep2Bg = 'FAFAFA'; const colorStep2Border = 'BDBDBD';
        const colorStep3Bg = 'F1F8E9'; const colorStep3Border = '66BB6A';

        const fontTitle = 'Montserrat';
        const fontBody = 'Noto Sans JP';

        pres.defineSlideMaster({
            title: 'MASTER_SLIDE',
            background: { color: 'FFFFFF' },
            objects: [
                { rect: { x: 0, y: 0, w: '100%', h: 0.1, fill: { type: 'linear', color1: colorPrimary, color2: colorAccent, angle: 90 } } },
            ],
            slideNumber: { x: 12.8, y: 7.0, color: colorLightText, fontSize: 12, fontFace: fontTitle }
        });

        pres.defineSlideMaster({
            title: 'TITLE_SLIDE_MASTER',
            background: { color: 'FFFFFF' },
            slideNumber: { x: 12.8, y: 7.0, color: colorLightText, fontSize: 12, fontFace: fontTitle }
        });

        slidesData.forEach((slideData) => {
            let slide;
            if (slideData.type === 'title') {
                 slide = pres.addSlide({ masterName: 'TITLE_SLIDE_MASTER' });
            } else {
                 slide = pres.addSlide({ masterName: 'MASTER_SLIDE' });
            }

            if (slideData.type === 'title') {
                slide.addText(slideData.title, { 
                    x: 0.8, y: 2.5, w: '85%', h: 2, 
                    fontSize: 44, color: colorPrimary, bold: true, fontFace: fontTitle, align: 'left' 
                });
                slide.addShape(pres.ShapeType.rect, { x: 0.8, y: 4.8, w: 0.1, h: 1.5, fill: colorAccent });
                slide.addText(slideData.sub, { 
                    x: 1.0, y: 4.8, w: '80%', h: 1.5, 
                    fontSize: 20, color: colorText, align: 'left', fontFace: fontBody, lineSpacing: 32
                });

            } else if (slideData.type === 'concept') {
                slide.addText(slideData.title, { 
                    x: 0.8, y: 0.8, w: '90%', h: 0.8, 
                    fontSize: 32, color: colorPrimary, bold: true, fontFace: fontTitle, valign:'bottom'
                });
                slide.addShape(pres.ShapeType.rect, { x: 0.8, y: 1.65, w: 1.2, h: 0.05, fill: colorAccent });

                let contentText = slideData.content.join('\n');
                slide.addText(contentText, {
                    x: 0.8, y: 2.2, w: '85%', h: 4.5,
                    fontSize: 20, color: colorText, lineSpacing: 36, bullet: { color: colorAccent }, fontFace: fontBody
                });

            } else if (slideData.type === 'case') {
                slide.addText(slideData.title, { 
                    x: 0.8, y: 0.6, w: '90%', h: 0.8, 
                    fontSize: 32, color: colorPrimary, bold: true, fontFace: fontTitle, valign:'bottom'
                });
                slide.addShape(pres.ShapeType.rect, { x: 0.8, y: 1.45, w: 1.2, h: 0.05, fill: colorAccent });

                slide.addText(slideData.subTitle, {
                    x: 0.8, y: 1.6, w: '90%', h: 0.5,
                    fontSize: 18, color: colorLightText, fontFace: fontBody
                });

                const yPos = 2.5;
                const boxW = 3.8;
                const boxH = 4.0;
                const arrowW = 0.6;
                
                // Step 1
                slide.addShape(pres.ShapeType.rect, { x: 0.8, y: yPos, w: boxW, h: 0.1, fill: colorStep1Border });
                slide.addShape(pres.ShapeType.rect, { x: 0.8, y: yPos + 0.1, w: boxW, h: boxH, fill: colorStep1Bg });
                slide.addText("STEP-1", { x: 1.0, y: yPos + 0.3, w: boxW-0.4, fontSize: 10, color: colorLightText, fontFace: fontTitle });
                slide.addText(slideData.step1.label, { x: 1.0, y: yPos + 0.6, w: boxW-0.4, fontSize: 16, bold: true, color: colorPrimary, fontFace: fontTitle });
                slide.addText(slideData.step1.text, { x: 1.0, y: yPos + 1.2, w: boxW-0.4, h: boxH-1.5, fontSize: 14, color: colorText, valign: 'top', fontFace: fontBody });

                // Arrow 1
                slide.addText("▶", { x: 4.7, y: yPos + 1.8, w: arrowW, fontSize: 24, color: colorAccent, align:'center' });

                // Step 2
                slide.addShape(pres.ShapeType.rect, { x: 5.4, y: yPos, w: boxW, h: 0.1, fill: colorStep2Border });
                slide.addShape(pres.ShapeType.rect, { x: 5.4, y: yPos + 0.1, w: boxW, h: boxH, fill: colorStep2Bg });
                slide.addText("STEP-2", { x: 5.6, y: yPos + 0.3, w: boxW-0.4, fontSize: 10, color: colorLightText, fontFace: fontTitle });
                slide.addText(slideData.step2.label, { x: 5.6, y: yPos + 0.6, w: boxW-0.4, fontSize: 16, bold: true, color: colorPrimary, fontFace: fontTitle });
