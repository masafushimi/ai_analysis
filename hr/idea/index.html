<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI DX Strategy Report - 株式会社イデア</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a88a5d; --bg: #fdfcfb; --accent: #e27d60; --text: #333; --card-bg: #ffffff; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; padding: 40px 0; border-bottom: 2px solid var(--primary); margin-bottom: 40px; }
        header h1 { color: var(--primary); margin: 0; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; border-top: 4px solid var(--primary); }
        .card-content { padding: 20px; flex-grow: 1; }
        .role-badge { background: var(--primary); color: #fff; padding: 3px 10px; border-radius: 15px; font-size: 0.75rem; display: inline-block; margin-bottom: 10px; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; border-left: 3px solid var(--accent); padding-left: 8px; }
        .section-title { font-size: 0.85rem; font-weight: bold; color: var(--primary); margin-top: 10px; }
        .card-text { font-size: 0.9rem; margin: 5px 0 10px 0; color: #555; }
        .impact-box { background: #fff8f0; padding: 12px; border-radius: 6px; border: 1px dashed var(--accent); font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <h1>AI DX Strategy Portfolio</h1>
    <p>株式会社イデア 様：技術人材×請負開発のAI変革</p>
</header>

<div class="container">
    <script>
        const cases = [
            {role:"営業・マッチング", title:"AIスキルマッチングエンジン", prob:"案件票と職務経歴書の照合に多大な時間を要し、機会損失が発生。", sol:"LLMが要件定義を解析し、最適な技術者を即座にランキング表示。", impact:"マッチング速度500%向上。初動の速さによる成約率アップ。"},
            {role:"採用・キャリア", title:"スキルシート自動最適化AI", prob:"技術者の強みが伝わりにくいスキルシートが多く、書類選考で損をしている。", sol:"エンジニアとの対話からAIが市場価値の高い「売れる」経歴書へリライト。", impact:"書類通過率30%向上。技術者の自己PR負担を大幅軽減。"},
            {role:"請負・開発", title:"AIコード品質・セキュリティ監査", prob:"請負案件において、属人的なミスによる不具合や脆弱性のリスク。", sol:"コミット時にAIが自動レビューを行い、標準化された品質を担保。", impact:"バグ修正コストの40%削減。開発工程の安定化。"},
            {role:"バックオフィス", title:"派遣法・契約管理AI監視", prob:"抵触日管理や法改正への対応が複雑で、管理者の精神的負担が大きい。", sol:"契約データを常時監視。更新時期や法規制の変更を自動通知・対応案提示。", impact:"コンプライアンス違反リスクの根絶。管理工数の大幅削減。"},
            {role:"マネジメント", title:"AIエンゲージメント予兆検知", prob:"派遣先での孤独感やストレスによる、予期せぬ離職の発生。", sol:"週報のトーン分析や勤怠の微細な変化から、ケアが必要な社員をアラート。", impact:"離職率の15%低減。適切なタイミングでのキャリアフォロー実現。"},
            {role:"ナレッジ資産化", title:"社内知見NotebookLM", prob:"過去のプロジェクトで得た特殊な技術知見が、担当者退職と共に消える。", sol:"全プロジェクトの技術資料をセキュアに学習し、誰でも聞ける「先生」化。", impact:"社内調査時間の80%削減。属人化の解消。"},
            {role:"営業", title:"派遣単価・市場予測AI", prob:"感覚に頼った単価交渉になり、適切な利益を確保しきれない。", sol:"統計データとエンジニアの相対評価を紐解き、根拠ある交渉単価を算出。", impact:"売上総利益率の平均3%改善。公平な評価基準の確立。"},
            {role:"企画・教育", title:"AIスキルアップ・ロードマップ", prob:"技術トレンドの移り変わりが速く、教育が追いつかない。", sol:"現在のスキルと市場ニーズのギャップを分析し、最適な学習経路を自動生成。", impact:"エンジニアの市場価値向上。リスキリングの自走化。"},
            {role:"採用", title:"AI面接サポーター", prob:"面接官によって評価基準がバラつき、優秀な人材を見落とすリスク。", sol:"面接の対話から客観的なスキルスコアリングを行い、定量的評価を支援。", impact:"採用後のミスマッチを20%削減。選考のスピードアップ。"},
            {role:"請負・上流工程", title:"要件定義構造化エージェント", prob:"クライアントの要求が曖昧で、後工程での手戻りが多い。", sol:"AIが要件の矛盾や不足を自動検知。論理的なWBSを自動生成。", impact:"上流工程のリードタイム30%削減。手戻り防止。"},
            {role:"営業・マーケ", title:"企業ニーズ予測クローリング", prob:"どの企業が、いつ、どんな技術者を求めているかの把握が困難。", sol:"ターゲット企業の採用情報やニュースを解析し、ニーズ発生の予兆をキャッチ。", impact:"先行提案の増加による競合優位性の確保。"},
            {role:"教育・広報", title:"技術ドキュメント動画化AI", prob:"文字だけのマニュアルでは、若手への技術承継がスムーズにいかない。", sol:"仕様書から、AIがナレーション付きの解説動画を自動生成。", impact:"研修効率の向上。社内情報の動画アーカイブ化促進。"},
            {role:"経営", title:"AIリソース・ポートフォリオ", prob:"稼働状況の可視化が遅れ、過剰な採用や受注機会の損失が発生。", sol:"半年先のプロジェクト終了予定と、受注確率を統合した経営予測。", impact:"人員計画の最適化。投資判断の迅速化。"},
            {role:"事務", title:"入館・セキュリティ申請Bot", prob:"派遣先ごとに異なる煩雑な事務手続き。技術者の生産性を下げている。", sol:"各社の手続きをボットが代行。必要な情報を抽出し、自動で申請書を作成。", impact:"非稼働事務作業の50%削減。エンジニアの満足度向上。"},
            {role:"リスク管理", title:"セキュアAIゲートウェイ", prob:"技術者が生成AIを使う際、顧客コードが漏洩するリスク。", sol:"入出力をフィルタリング。個人情報や機密情報をマスキングする専用環境。", impact:"安全なAI利用の徹底。クライアントへの信頼醸成。"}
        ];

        const container = document.querySelector('.container');
        cases.forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <div class="card-content">
                        <span class="role-badge">${item.role}</span>
                        <div class="card-title">${item.title}</div>
                        <div class="section-title"><i class="fas fa-exclamation-triangle"></i> 現状の課題</div>
                        <p class="card-text">${item.prob}</p>
                        <div class="section-title"><i class="fas fa-magic"></i> AI活用ステップ</div>
                        <p class="card-text">${item.sol}</p>
                        <div class="impact-box"><strong>導入効果:</strong> ${item.impact}</div>
                    </div>
                </div>
            `;
        });
    </script>
</div>

<footer>
    <p>&copy; 2026 全業界対応型 AI DX戦略コンサルタント - 株式会社イデア DX推進プロジェクト</p>
</footer>

</body>
</html>
